<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Sri Chit Funds — Management Software</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0f1b2d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chit Funds">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" href="./icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --navy:#0f1b2d;
  --navy-2:#152238;
  --navy-3:#1c2c47;
  --gold:#c9982f;
  --gold-2:#e0b654;
  --paper:#f6f4ef;
  --card:#ffffff;
  --ink:#1c2230;
  --muted:#6b7280;
  --line:#e7e3d8;
  --green:#1f8a5f;
  --red:#c1443a;
  --amber:#b8842a;
  --radius:10px;
  --shadow:0 2px 10px rgba(15,27,45,.08);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:var(--paper);
  color:var(--ink);
  display:flex;
  min-height:100vh;
  font-size:14px;
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#c9c2af;border-radius:4px;}

/* ---------- Sidebar ---------- */
#sidebar{
  width:220px;min-width:220px;
  background:linear-gradient(180deg,var(--navy) 0%,var(--navy-2) 100%);
  color:#dbe4f0;
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;
}
.brand{
  display:flex;align-items:center;gap:10px;
  padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.08);
}
.brand .mark{
  width:38px;height:38px;border-radius:9px;
  background:linear-gradient(135deg,var(--gold),var(--gold-2));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;color:var(--navy);font-size:16px;flex-shrink:0;
}
.brand div.name{font-weight:700;font-size:15px;color:#fff;line-height:1.15;}
.brand div.sub{font-size:10.5px;color:#9fb0c9;letter-spacing:.4px;}

nav{flex:1;padding:10px;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:8px;margin-bottom:3px;
  color:#c3cee0;cursor:pointer;font-size:13.5px;font-weight:500;
  transition:.15s;user-select:none;
}
.nav-item .ic{width:18px;text-align:center;font-size:15px;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:var(--gold);color:var(--navy);font-weight:700;}
.nav-foot{padding:12px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#8092ab;}

/* ---------- Main ---------- */
#main{flex:1;min-width:0;display:flex;flex-direction:column;}
#topbar{
  background:var(--card);border-bottom:1px solid var(--line);
  padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:5;
}
#topbar h1{font-size:19px;margin:0;color:var(--navy);}
#topbar .meta{font-size:12px;color:var(--muted);}
#content{padding:22px;flex:1;}

/* ---------- Cards / Grid ---------- */
.grid{display:grid;gap:16px;}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1000px){.grid.cols-4{grid-template-columns:repeat(2,1fr);}.grid.cols-3{grid-template-columns:repeat(2,1fr);}}

.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;box-shadow:var(--shadow);
}
.stat{position:relative;overflow:hidden;}
.stat .label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.stat .value{font-size:26px;font-weight:800;margin-top:6px;color:var(--navy);}
.stat.gold .value{color:var(--amber);}
.stat.red .value{color:var(--red);}
.stat.green .value{color:var(--green);}
.stat .bar{position:absolute;left:0;top:0;bottom:0;width:4px;}
.stat.b1 .bar{background:var(--navy);}
.stat.b2 .bar{background:var(--gold);}
.stat.b3 .bar{background:var(--green);}
.stat.b4 .bar{background:var(--red);}

h2.section-title{font-size:15px;color:var(--navy);margin:0 0 14px 0;font-weight:700;display:flex;align-items:center;gap:8px;}
h2.section-title .te{font-size:11.5px;color:var(--muted);font-weight:400;}

/* ---------- Forms ---------- */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:800px){.form-grid{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:5px;}
.field.full{grid-column:1/-1;}
.field label{font-size:12.5px;font-weight:600;color:#3a4257;}
.field label .te{font-weight:400;color:var(--muted);font-size:11px;}
input,select,textarea{
  padding:9px 11px;border:1px solid var(--line);border-radius:7px;
  font-size:13.5px;background:#fcfbf8;color:var(--ink);font-family:inherit;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);background:#fff;}
.actions-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}

button{
  border:none;border-radius:7px;padding:10px 18px;font-size:13.5px;font-weight:600;
  cursor:pointer;transition:.15s;
}
.btn-primary{background:var(--green);color:#fff;}
.btn-primary:hover{background:#186f4c;}
.btn-secondary{background:var(--navy);color:#fff;}
.btn-secondary:hover{background:var(--navy-2);}
.btn-ghost{background:#eceae2;color:#3a4257;}
.btn-ghost:hover{background:#e2dfd3;}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{background:#a63a30;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-gold:hover{background:var(--gold-2);}
button:disabled{opacity:.5;cursor:not-allowed;}

/* ---------- Tables ---------- */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{
  text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;
  color:var(--muted);border-bottom:2px solid var(--line);padding:9px 10px;font-weight:700;
}
td{padding:10px;border-bottom:1px solid #f0eee6;}
td.amt{white-space:nowrap;text-align:right;font-weight:700;font-variant-numeric:tabular-nums;}
th.amt-h{text-align:right;}
.amt-green{color:var(--green);}
.amt-red{color:var(--red);}
.amt-gold{color:var(--amber);}
.amt-navy{color:var(--navy);}
.report-head{
  border-bottom:3px solid var(--navy);padding-bottom:14px;margin-bottom:20px;
  display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;
}
.report-head h1{font-size:20px;color:var(--navy);margin:0 0 4px;letter-spacing:.3px;}
.report-head .meta-line{font-size:12px;color:var(--muted);}
.report-head .gen-date{font-size:11.5px;color:var(--muted);text-align:right;}
.report-section{margin-top:26px;}
.report-section-title{
  display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;color:#fff;
  background:var(--navy);padding:9px 14px;border-radius:7px 7px 0 0;margin:0;
}
.report-section-title.gold{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:var(--navy);}
.report-section-title.red{background:var(--red);}
.report-section table{border:1px solid var(--line);border-top:none;border-radius:0 0 7px 7px;overflow:hidden;}
.report-section table thead th{background:#faf9f5;}
@media print{
  .report-head{border-bottom-color:#000;}
  .report-section-title{background:#eee !important;color:#000 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
tr:hover td{background:#fbfaf6;}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.pill.paid{background:#dff4e8;color:var(--green);}
.pill.pending{background:#fdeadd;color:var(--red);}
.pill.active{background:#e4edfb;color:#2557a7;}
.pill.closed{background:#e9e6df;color:#6b7280;}
.row-actions{display:flex;gap:6px;}
.icon-btn{background:none;border:1px solid var(--line);border-radius:6px;padding:5px 9px;font-size:12px;cursor:pointer;}
.icon-btn:hover{background:#f2f0e8;}
.icon-btn.del{color:var(--red);border-color:#f0d2ce;}
.icon-btn.del:hover{background:#fdecea;}

.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty .big{font-size:34px;margin-bottom:8px;}

.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.search-box{padding:9px 12px;border:1px solid var(--line);border-radius:7px;min-width:220px;background:#fcfbf8;}

.calc-box{
  background:#fbf6ea;border:1px solid #ecdcb0;border-radius:8px;padding:14px 16px;margin-top:6px;
}
.calc-box .row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;}
.calc-box .row.total{border-top:1px dashed #d9c48c;margin-top:6px;padding-top:8px;font-weight:800;color:var(--navy);}

/* ---------- Receipt ---------- */
#receiptPreview{
  max-width:440px;margin:0 auto;background:#fff;border:1px solid #dcd6c4;
  padding:24px;border-radius:6px;
}
#receiptPreview .rhead{text-align:center;border-bottom:2px solid var(--navy);padding-bottom:10px;margin-bottom:10px;}
#receiptPreview .rhead h3{margin:0;color:var(--navy);font-size:18px;letter-spacing:.5px;}
#receiptPreview .rhead p{margin:2px 0;font-size:11px;color:var(--muted);}
#receiptPreview .rtitle{background:var(--navy);color:#fff;text-align:center;padding:6px;font-weight:700;letter-spacing:1px;font-size:12.5px;margin:10px 0;border-radius:3px;}
#receiptPreview .rline{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;border-bottom:1px dotted #e5e0d0;}
#receiptPreview .rsign{text-align:right;margin-top:30px;font-size:12px;font-style:italic;color:var(--muted);}
@media print{
  body *{visibility:hidden;}
  .printable,.printable *{visibility:visible;}
  .printable{position:absolute;top:0;left:0;width:100%;border:none;}
}

.toast{
  position:fixed;bottom:22px;right:22px;background:var(--navy);color:#fff;padding:12px 18px;
  border-radius:8px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:999;
  opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0);}

.modal-overlay{position:fixed;inset:0;background:rgba(15,27,45,.5);display:none;align-items:center;justify-content:center;z-index:100;}
.modal-overlay.show{display:flex;}
.modal-box{background:#fff;border-radius:10px;padding:22px;max-width:400px;width:90%;box-shadow:0 10px 40px rgba(0,0,0,.25);}
.modal-box h3{margin-top:0;color:var(--navy);}
.modal-box p{white-space:pre-line;}
.modal-box .actions-row{justify-content:flex-end;}

.view{display:none;}
.view.active{display:block;}

#hamb{display:none;background:none;border:none;font-size:22px;color:var(--navy);cursor:pointer;padding:4px 8px;}
@media(max-width:880px){
  #sidebar{position:fixed;left:-240px;z-index:50;transition:.2s;box-shadow:4px 0 20px rgba(0,0,0,.2);}
  #sidebar.open{left:0;}
  #hamb{display:block;}
  .grid.cols-4,.grid.cols-3,.grid.cols-2{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="licenseGate" style="display:none;position:fixed;inset:0;background:rgba(15,27,45,.75);z-index:200;align-items:center;justify-content:center;"></div>
<div id="sidebar">
  <div class="brand">
    <div class="mark">₹</div>
    <div>
      <div class="name" id="brandName">SRI CHIT FUNDS</div>
      <div class="sub">MANAGEMENT SOFTWARE</div>
    </div>
  </div>
  <nav id="navList"></nav>
  <div class="nav-foot" id="navFoot">Offline Edition<br>All data stored on this device</div>
</div>

<div id="main">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <button id="hamb">☰</button>
      <h1 id="pageTitle">Dashboard</h1>
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <span id="licenseBadge" class="pill" style="display:none;cursor:pointer;"></span>
      <button id="installBtn" onclick="installApp()" class="btn-gold" style="display:none;align-items:center;gap:6px;padding:8px 14px;font-size:12.5px;">⬇ Install App</button>
      <div class="meta" id="dateNow"></div>
    </div>
  </div>
  <div id="content"></div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <h3>Confirm</h3>
    <p id="confirmMsg">Are you sure?</p>
    <div class="actions-row">
      <button class="btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn-danger" id="confirmYes">Delete</button>
    </div>
  </div>
</div>

<script>
/* =========================================================
   SRI CHIT FUNDS — Offline Management Software
   All data persisted to localStorage. No server / internet needed.
========================================================= */

const APP_VERSION = '0.16';

/* ---------------- Licensing (paste your Public Key from the Mother App below) ---------------- */
// Leave this as null while you are setting up — the app runs unrestricted.
// Once you generate a Master Key in the License Manager (Mother App), copy
// its Public Key JSON here to switch on license enforcement for everyone
// using this deployed app.
const PUBLIC_KEY_JWK = {"key_ops":["verify"],"ext":true,"kty":"EC","x":"JKNrQ6aRpGtHq3TAXgnmR3JBO1S2TMPVKBl1JJ6UPK4","y":"NrfGihBM9cH-okWZDwRaMSvOxWPRKKGEh2mw3lBBv20","crv":"P-256"};
const LICENSE_STORAGE_KEY = 'chitSoftwareLicense_v1';
const LICENSE_GRACE_DAYS = 5;
const SELLER_CONTACT = '9876543210'; // <-- put YOUR (the seller's) WhatsApp number here for renewal contact
const DB_KEY = 'chitSoftwareDB_v1';
const AUTO_BACKUP_KEY = 'chitSoftwareAutoBackups_v1';
const todayStr = ()=> new Date().toISOString().slice(0,10);

function loadDB(){
  let raw = localStorage.getItem(DB_KEY);
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  return {
    settings:{ orgName:'Sri Chit Funds', address:'# 12-27-28, Main Road, Kurnool - 518001', phone:'9876543210', nextReceiptNo: 1001 },
    members:[], groups:[], collections:[], auctions:[], receipts:[]
  };
}
let DB = loadDB();
function save(){ localStorage.setItem(DB_KEY, JSON.stringify(DB)); }

/* ---------------- Auto Daily Backup ---------------- */
// Every time the app is opened on a new calendar day, silently snapshot
// the data into localStorage (keeps last 7 days) so nothing is lost even
// if the user forgets to take a manual backup.
function getAutoBackups(){
  try{ return JSON.parse(localStorage.getItem(AUTO_BACKUP_KEY) || '[]'); } catch(e){ return []; }
}
function autoDailyBackup(){
  try{
    let backups = getAutoBackups();
    const today = todayStr();
    if(!backups.length || backups[backups.length-1].date !== today){
      backups.push({ date: today, data: DB });
      if(backups.length > 7) backups = backups.slice(-7);
      localStorage.setItem(AUTO_BACKUP_KEY, JSON.stringify(backups));
    }
  } catch(e){ /* storage full or unavailable - ignore silently */ }
}
function restoreAutoBackup(date){
  const backups = getAutoBackups();
  const b = backups.find(x=>x.date===date);
  if(!b){ toast('Backup not found'); return; }
  askConfirm('Restore data from ' + date + '? This replaces all current data.', ()=>{
    DB = b.data; save(); syncBrandName(); toast('Restored from ' + date); goto('dashboard');
  }, 'Restore', 'btn-primary');
}
function downloadAutoBackup(date){
  const backups = getAutoBackups();
  const b = backups.find(x=>x.date===date);
  if(!b){ toast('Backup not found'); return; }
  const blob = new Blob([JSON.stringify(b.data,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'chit-software-autobackup-' + date + '.json'; a.click();
}

function uid(prefix){ return prefix + Math.random().toString(36).slice(2,8).toUpperCase(); }
function inr(n){ n = Number(n)||0; return '₹' + n.toLocaleString('en-IN'); }
// jsPDF's built-in fonts (Helvetica etc.) do not contain the ₹ glyph — it
// renders as a stray superscript "1" instead. Use this for ANY text drawn
// inside a PDF (doc.text calls); keep inr() with ₹ for on-screen HTML.
function pdfAmt(n){ n = Number(n)||0; return 'Rs. ' + n.toLocaleString('en-IN'); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function b64urlToBytes(str){
  str = str.replace(/-/g,'+').replace(/_/g,'/');
  while(str.length % 4) str += '=';
  const bin = atob(str);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}
let _cachedPublicKey = null;
async function importLicensePublicKey(){
  if(!PUBLIC_KEY_JWK) return null;
  if(_cachedPublicKey) return _cachedPublicKey;
  try{
    _cachedPublicKey = await crypto.subtle.importKey('jwk', PUBLIC_KEY_JWK, {name:'ECDSA', namedCurve:'P-256'}, true, ['verify']);
    return _cachedPublicKey;
  } catch(e){ return null; }
}
async function verifyLicenseKeyString(keyStr){
  const pub = await importLicensePublicKey();
  if(!pub) return { valid:false, reason:'Licensing is not configured on this app yet.' };
  const parts = (keyStr||'').trim().split('.');
  if(parts.length !== 2) return { valid:false, reason:'This does not look like a valid license key.' };
  try{
    const sigBytes = b64urlToBytes(parts[1]);
    const ok = await crypto.subtle.verify({name:'ECDSA', hash:'SHA-256'}, pub, sigBytes, new TextEncoder().encode(parts[0]));
    if(!ok) return { valid:false, reason:'This key is invalid or has been altered.' };
    const payload = JSON.parse(new TextDecoder().decode(b64urlToBytes(parts[0])));
    if(!payload.expires || !payload.cid) return { valid:false, reason:'This key is malformed.' };
    return { valid:true, payload };
  } catch(e){ return { valid:false, reason:'Could not read this key.' }; }
}
function getStoredLicense(){
  try{ return JSON.parse(localStorage.getItem(LICENSE_STORAGE_KEY) || 'null'); } catch(e){ return null; }
}
function licenseStatus(){
  const lic = getStoredLicense();
  if(!lic) return { state:'none' };
  const today = new Date(todayStr());
  const expiry = new Date(lic.expires);
  const daysLeft = Math.ceil((expiry - today) / 86400000);
  if(daysLeft >= 0) return { state:'active', daysLeft, lic };
  if(daysLeft >= -LICENSE_GRACE_DAYS) return { state:'grace', daysLeft, lic };
  return { state:'expired', daysLeft, lic };
}
async function activateLicenseKey(){
  const input = document.getElementById('licenseKeyInput');
  const keyStr = input ? input.value.trim() : '';
  if(!keyStr){ toast('Please paste your license key'); return; }
  const result = await verifyLicenseKeyString(keyStr);
  if(!result.valid){ toast('❌ ' + result.reason); return; }
  localStorage.setItem(LICENSE_STORAGE_KEY, JSON.stringify(result.payload));
  toast('✅ License activated!');
  const wasLocked = document.getElementById('sidebar').style.display === 'none';
  if(wasLocked){ checkLicenseAndBoot(); } else { renderLicense(); showLicenseBadge(licenseStatus()); }
}
function showLicenseBadge(status){
  const el = document.getElementById('licenseBadge');
  if(!el) return;
  if(status.state === 'active'){
    el.style.display = 'inline-block';
    el.className = 'pill ' + (status.daysLeft <= 30 ? 'pending' : 'paid');
    el.textContent = '🔑 ' + status.daysLeft + 'd left';
  } else if(status.state === 'grace'){
    el.style.display = 'inline-block';
    el.className = 'pill pending';
    el.textContent = '⚠ Renew: ' + (LICENSE_GRACE_DAYS + status.daysLeft) + 'd grace';
  } else {
    el.style.display = 'none';
  }
  el.onclick = ()=> goto('license');
}
function renderLicense(){
  const status = licenseStatus();
  const lic = status.lic;
  let diag = null;
  try{ diag = JSON.parse(localStorage.getItem('chitLastRevocationCheck') || 'null'); } catch(e){}
  content.innerHTML = `
  <div class="card" style="max-width:520px;">
    <h2 class="section-title">App License <span class="te">లైసెన్స్</span></h2>
    ${lic ? `
      <div class="calc-box" style="margin-bottom:16px;">
        <div class="row"><span>Customer ID</span><b>${esc(lic.cid)}</b></div>
        <div class="row"><span>Name</span><b>${esc(lic.name||'')}</b></div>
        <div class="row"><span>Valid From</span><b>${lic.issued}</b></div>
        <div class="row total"><span>Valid Until</span><b>${lic.expires}</b></div>
      </div>
      <p style="font-size:13px;">${
        status.state==='active' ? `✅ ${status.daysLeft} day(s) remaining` :
        status.state==='grace' ? `⚠ Expired — ${LICENSE_GRACE_DAYS + status.daysLeft} grace day(s) left. Please renew soon.` :
        '❌ License expired. Please enter a renewal key below to continue.'
      }</p>
    ` : `<p style="color:var(--muted);font-size:13px;">No license activated yet. Paste the key your provider sent you below.</p>`}
    <div class="field full" style="margin-top:14px;">
      <label>Paste New / Renewal License Key</label>
      <textarea id="licenseKeyInput" rows="3" placeholder="Paste the key your provider sent you"></textarea>

async function manualRevokedRecheck(){
  const btn = document.getElementById('revokedRecheckBtn');
  if(btn){ btn.textContent = 'Checking...'; btn.disabled = true; }
  await recheckRevocation();
  if(btn && document.getElementById('revokedRecheckBtn')){
    // still locked — restore button text
    btn.textContent = '🔄 Check Again'; btn.disabled = false;
  }
}
// Checks the provider's public "deactivated customers" list, hosted next to
// this app (revoked-list.json). Requires internet to check; if offline or
// the file can't be reached, the app fails OPEN (continues normally) since
// a purely offline app cannot enforce a remote deactivation without a
// network connection at that moment.
async function isCustomerRevoked(cid){
  if(!cid) return false;
  try{
    const res = await fetch('./revoked-list.json?t=' + Date.now(), { cache:'no-store' });
    if(!res.ok){
      localStorage.setItem('chitLastRevocationCheck', JSON.stringify({time:new Date().toISOString(), ok:false, info:'HTTP '+res.status}));
      return false;
    }
    const data = await res.json();
    localStorage.setItem('chitLastRevocationCheck', JSON.stringify({time:new Date().toISOString(), ok:true, info:'Checked '+(data.revoked||[]).length+' revoked ID(s)'}));
    return Array.isArray(data.revoked) && data.revoked.includes(cid);
  } catch(e){
    localStorage.setItem('chitLastRevocationCheck', JSON.stringify({time:new Date().toISOString(), ok:false, info:'Could not reach server (offline, or app opened as a local file instead of the live website)'}));
    return false;
  }
}
async function checkLicenseAndBoot(){
  if(!PUBLIC_KEY_JWK){
    // Licensing not configured yet by the developer — app runs unrestricted.
    document.getElementById('licenseGate').style.display = 'none';
    document.getElementById('sidebar').style.display = '';
    document.getElementById('main').style.display = '';
    autoDailyBackup(); syncBrandName(); goto('dashboard');
    setTimeout(()=> checkForUpdate(false), 2500);
    return;
  }
  const status = licenseStatus();
  const cid = status.lic ? status.lic.cid : null;
  const revoked = await isCustomerRevoked(cid);
  if(revoked){
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('main').style.display = 'none';
    renderRevokedScreen(cid);
    return;
  }
  if(status.state === 'active' || status.state === 'grace'){
    document.getElementById('licenseGate').style.display = 'none';
    document.getElementById('sidebar').style.display = '';
    document.getElementById('main').style.display = '';
    showLicenseBadge(status);
    autoDailyBackup(); syncBrandName(); goto('dashboard');
    setTimeout(()=> checkForUpdate(false), 2500);
  } else {
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('main').style.display = 'none';
    renderLicenseGateScreen(status);
  }
}

// Same adjustment logic as Reminders: if the group had an auction in the
// calendar month BEFORE the selected due month, use that auction's net
// installment (installment minus dividend share) instead of the plain
// group installment.
function getAdjustedInstallmentForMonth(g, monthKey){
  if(!g) return 0;
  if(!monthKey) return g.installment;
  const [y, mo] = monthKey.split('-').map(Number);
  const prevDate = new Date(y, mo-2, 1); // mo is 1-indexed; mo-2 -> previous month
  const prevKey = prevDate.toISOString().slice(0,7);
  const auctionsPrevMonth = DB.auctions.filter(a => a.groupId===g.id && a.date && a.date.slice(0,7)===prevKey);
  if(!auctionsPrevMonth.length) return g.installment;
  const latest = [...auctionsPrevMonth].sort((a,b)=> b.date.localeCompare(a.date))[0];
  return latest.netInstallment;
}

    lines.forEach(line=>{
      if(y > 780){ doc.addPage(); y = 50; }
      doc.text(line, margin, y);
      y += size*1.35;
    });
    y += gap || 6;

  addWrapped('NOW THIS AGREEMENT WITNESSES AS FOLLOWS:', 11, true, 8);
  [
    `1. The Foreman has this day paid, and the Prized Subscriber acknowledges having received, the sum of ${pdfAmt(a.bidAmount)} (Rupees ${numToWords(a.bidAmount)}) as the prize amount of this month's chit auction, subject to the terms below.`,

    `3. The Prized Subscriber shall, at the request of the Foreman, furnish acceptable surety/guarantee for due payment of the remaining subscription amount, as required under the rules of this chit group and the Chit Funds Act, 1982.`,

    `5. The Prized Subscriber shall not withdraw from the chit group nor transfer subscriber rights to any third party without prior written consent of the Foreman.`,
    `6. This agreement is executed on a Government Revenue Stamp affixed below, duly signed by the Prized Subscriber in acknowledgment of the terms herein and receipt of the prize amount.`,
    `7. Any dispute arising out of this agreement shall be subject to the jurisdiction of the local courts only.`
  ].forEach(t => addWrapped(t, 10, false, 8));
  addWrapped('Note: This is a general-purpose template. Please have it reviewed by your auditor/advocate to ensure it meets the documentation required under the Chit Funds Act, 1982 and your state\'s chit fund rules before use.', 8.5, false, 34);

  if(y > 690){ doc.addPage(); y = 60; }

  doc.rect(margin, y, boxW, boxH);

function nextMonthInfo(){
  const now = new Date();
  const d = new Date(now.getFullYear(), now.getMonth()+1, 1);
  return { key: d.toISOString().slice(0,7), label: d.toLocaleDateString('en-IN',{month:'long',year:'numeric'}) };
}
// If a group had an auction THIS calendar month, the discount/dividend
// reduces every member's installment for the upcoming due month. Returns
// the adjusted amount to collect, and the auction record if one applied.
function getGroupAdjustedDue(g){
  const thisMonthKey = new Date().toISOString().slice(0,7);
  const auctionsThisMonth = DB.auctions.filter(a => a.groupId===g.id && a.date && a.date.slice(0,7)===thisMonthKey);
  if(!auctionsThisMonth.length) return { amount: g.installment, auction: null };
  const latest = [...auctionsThisMonth].sort((a,b)=> b.date.localeCompare(a.date))[0];
  return { amount: latest.netInstallment, auction: latest };
}
// Converts 1 -> "1st", 2 -> "2nd", 3 -> "3rd", 4 -> "4th", 11/12/13 -> "th", etc.
function ordinal(n){
  const rem100 = n % 100;
  if(rem100 >= 11 && rem100 <= 13) return n + 'th';
  switch(n % 10){
    case 1: return n + 'st';
    case 2: return n + 'nd';
    case 3: return n + 'rd';
    default: return n + 'th';
  }
}
// Which installment number (chit number) is due next: count of auctions
// already conducted for this group so far, plus one. e.g. if 1 auction has
// happened, the upcoming due month is the group's 2nd installment.
function getInstallmentNumber(g){
  const count = DB.auctions.filter(a => a.groupId === g.id).length;
  return count + 1;
}

function buildReminderMessage(m, g, due){
  const nm = nextMonthInfo();
  const instNum = getInstallmentNumber(g);
  const instLabel = `${ordinal(instNum)} installment (చీటి)${g.months ? ' of ' + g.months : ''}`;
  if(due.auction){
    const a = due.auction;
    return `Dear ${m.name},\n\nThis is your ${instLabel} for ${g.name}, due on ${nm.label}. The amount has been adjusted after this month's auction (${a.date}):\n\nRegular Installment: ${inr(g.installment)}\nYour Discount Share: -${inr(g.installment - due.amount)}\nAmount to Pay: ${inr(due.amount)}\n\nKindly pay before the due date.\n\n— ${DB.settings.orgName}`;
  }
  return `Dear ${m.name},\n\nThis is a reminder for your ${instLabel} of ${inr(due.amount)} for ${g.name}, due on ${nm.label}.\n\nKindly pay before the due date to avoid inconvenience.\n\n— ${DB.settings.orgName}`;
}
function sendDueReminder(memberId, groupId){
  const m = DB.members.find(x=>x.id===memberId);

  if(!m.mobile){ toast('This member has no mobile number saved'); return; }
  const due = getGroupAdjustedDue(g);
  const text = buildReminderMessage(m, g, due);
  const phone = '91' + m.mobile;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
}
function copyAllReminderMessages(){
  const nm = nextMonthInfo();
  let rows = [];
  DB.groups.filter(g=>g.status==='Active').forEach(g=>{

    const due = getGroupAdjustedDue(g);

function numToWords(num){
  num = Math.round(Number(num)||0);
  if(num===0) return 'Zero Rupees Only';
  const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function two(n){ if(n<20) return ones[n]; return tens[Math.floor(n/10)] + (n%10? ' '+ones[n%10]:''); }
  function three(n){ if(n>99) return ones[Math.floor(n/100)]+' Hundred'+(n%100? ' '+two(n%100):''); return two(n); }
  let parts=[]; let crore=Math.floor(num/10000000); num%=10000000;
  let lakh=Math.floor(num/100000); num%=100000;
  let thousand=Math.floor(num/1000); num%=1000;
  let rest=num;
  if(crore) parts.push(three(crore)+' Crore');
  if(lakh) parts.push(three(lakh)+' Lakh');
  if(thousand) parts.push(three(thousand)+' Thousand');
  if(rest) parts.push(three(rest));
  return parts.join(' ') + ' Rupees Only';
}

/* ---------------- PDF generation + WhatsApp sharing ---------------- */
function generateReceiptPDF(r){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:[320, 520] });
  const s = DB.settings;
  const g = DB.groups.find(x=>x.id===r.groupId) || {};
  const m = DB.members.find(x=>x.id===r.memberId) || {};
  let y = 30;
  doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(15,27,45);
  doc.text(String(s.orgName||'').toUpperCase(), 160, y, {align:'center'}); y+=16;
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(90,90,90);
  doc.text(String(s.address||''), 160, y, {align:'center'}); y+=12;
  doc.text('Ph: '+(s.phone||''), 160, y, {align:'center'}); y+=8;
  y += 6;
  doc.setDrawColor(201,152,47); doc.setLineWidth(2); doc.line(20,y,300,y); y += 16;
  doc.setFillColor(15,27,45); doc.rect(20,y,280,20,'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text('RECEIPT — ' + (r.type||'Collection'), 160, y+14, {align:'center'});
  doc.setTextColor(0,0,0); y += 36;
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  function line(label,val,color){
    doc.setTextColor(0,0,0); doc.setFont('helvetica','normal'); doc.text(String(label), 25, y);
    if(color) doc.setTextColor(color[0],color[1],color[2]); doc.setFont('helvetica','bold');
    doc.text(String(val), 295, y, {align:'right'});
    doc.setTextColor(0,0,0);
    y += 17;
  }
  line('Receipt No', r.receiptNo);
  line('Date', r.date);
  line('Member ID', m.id||'');
  line('Member Name', m.name||'');
  line('Group', g.name||'');
  if(r.month) line('Month', r.month);
  if(r.type==='Auction'){
    line('Chit Amount', pdfAmt(r.chitAmount), [15,27,45]);
    line('Bid Amount', pdfAmt(r.bidAmount), [15,27,45]);
    line('Discount', pdfAmt(r.discount), [193,68,58]);
    line('Dividend', pdfAmt(r.dividend), [184,132,42]);
  }
  line('Amount', pdfAmt(r.amount), [31,138,95]);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(90,90,90);
  const words = doc.splitTextToSize('In Words: ' + numToWords(r.amount), 270);
  doc.text(words, 25, y); y += words.length*10 + 6;
  doc.setFontSize(10);
  line('Mode', r.mode||'Cash');
  y += 24;
  doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(90,90,90);
  doc.text('Authorised Sign', 295, y, {align:'right'});
  return doc;
}

function exportCSV(kind){
  let rows=[], name='';
  if(kind==='collections'){
    name='collections.csv';
    rows=[['Date','Member','Group','Amount','Status','Mode']];
    DB.collections.forEach(c=> rows.push([c.date, memberName(c.memberId), groupName(c.groupId), c.amount, c.status, c.mode]));
  } else {
    name='members.csv';
    rows=[['ID','Name','Mobile','Address','Status','Join Date']];
    DB.members.forEach(m=> rows.push([m.id,m.name,m.mobile,m.address,m.status,m.joinDate]));
  }
  const csv = rows.map(r=> r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click();
  toast('Exported ' + name);
}
async function shareReportWhatsApp(){
  const totalCollected = DB.collections.filter(c=>c.status==='Paid').reduce((s,c)=>s+Number(c.amount),0);
  const totalPending = DB.collections.filter(c=>c.status==='Pending').reduce((s,c)=>s+Number(c.amount),0);
  const summaryText = `${DB.settings.orgName} — Report (${todayStr()})\nTotal Collected: ${inr(totalCollected)}\nTotal Pending: ${inr(totalPending)}\nPending Members: ${DB.collections.filter(c=>c.status==='Pending').length}`;
  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const NAVY=[15,27,45], GOLD=[201,152,47], GREEN=[31,138,95], RED=[193,68,58], MUTED=[110,110,110];
    const pageW = doc.internal.pageSize.getWidth();
    const marginX = 14, rightX = pageW - 14;
    let y = 20;

    // ---- Letterhead ----
    doc.setFont('helvetica','bold'); doc.setFontSize(17); doc.setTextColor(...NAVY);
    doc.text(String(DB.settings.orgName||'Chit Fund'), marginX, y);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...MUTED);
    doc.text('BUSINESS REPORT', rightX, y, {align:'right'});
    y += 6;
    doc.text(String(DB.settings.address||''), marginX, y);
    doc.text('Generated: ' + new Date().toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}), rightX, y, {align:'right'});
    y += 6;
    doc.setDrawColor(...NAVY); doc.setLineWidth(1.2); doc.line(marginX, y, rightX, y);
    y += 12;

    // ---- Summary stat boxes ----
    const stats = [
      { label:'TOTAL COLLECTED', value: pdfAmt(totalCollected), color: GREEN },
      { label:'TOTAL PENDING', value: pdfAmt(totalPending), color: RED },
      { label:'PENDING MEMBERS', value: String(DB.collections.filter(c=>c.status==='Pending').length), color: GOLD },
    ];
    const boxW = (rightX - marginX - 12) / 3;
    stats.forEach((st, i) => {
      const bx = marginX + i*(boxW+6);
      doc.setFillColor(248,247,243); doc.setDrawColor(225,220,205);
      doc.roundedRect(bx, y, boxW, 26, 2, 2, 'FD');
      doc.setDrawColor(...st.color); doc.setLineWidth(2.2);
      doc.line(bx, y+2, bx, y+24);
      doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...MUTED);
      doc.text(st.label, bx+6, y+9);
      doc.setFont('helvetica','bold'); doc.setFontSize(12.5); doc.setTextColor(...st.color);
      doc.text(st.value, bx+6, y+19);
    });
    y += 38;

    function sectionHeader(title, color, textColor){
      doc.setFillColor(...color); doc.rect(marginX, y, rightX-marginX, 9, 'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(...(textColor||[255,255,255]));
      doc.text(title, marginX+4, y+6.3);
      y += 9;
      doc.setDrawColor(225,220,205); doc.setLineWidth(0.3);
    }
    function tableRow(cells, widths, opts){
      opts = opts || {};
      let x = marginX;
      doc.setFont('helvetica', opts.bold?'bold':'normal');
      doc.setFontSize(8.5);
      cells.forEach((c,i)=>{
        doc.setTextColor(...(opts.colors && opts.colors[i] ? opts.colors[i] : [30,30,30]));
        const align = opts.aligns && opts.aligns[i] === 'right' ? 'right' : 'left';
        const tx = align==='right' ? x+widths[i]-2 : x+2;
        doc.text(String(c), tx, y+6, {align});
        x += widths[i];
      });
      doc.line(marginX, y+8.5, rightX, y+8.5);
      y += 8.5;
      if(y > 275){ doc.addPage(); y = 20; }
    }

    // ---- Pending Members ----
    sectionHeader('PENDING MEMBERS REPORT', RED);
    const pendW = [55, 55, 40, rightX-marginX-150];
    doc.setFillColor(250,245,244);
    doc.rect(marginX, y, rightX-marginX, 7, 'F');
    tableRow(['Member','Group','Amount','Due Date'], pendW, {bold:true, aligns:['left','left','right','left']});
    const pending = DB.collections.filter(c=>c.status==='Pending');
    if(!pending.length){
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...GREEN);
      doc.text('✓ No pending payments — all clear!', marginX+2, y+7); y += 12;
    } else {
      pending.forEach(c=>{
        tableRow([memberName(c.memberId), groupName(c.groupId), pdfAmt(c.amount), c.date||'—'], pendW,
          {aligns:['left','left','right','left'], colors:[[30,30,30],[30,30,30],RED,[30,30,30]]});
      });
    }
    y += 10;

    // ---- Auction History ----
    sectionHeader('AUCTION HISTORY REPORT', GOLD, NAVY);
    const aucW = [30, 32, 40, 30, 30, (rightX-marginX-162)];
    doc.setFillColor(250,248,240);
    doc.rect(marginX, y, rightX-marginX, 7, 'F');
    tableRow(['Date','Group','Winner','Bid','Dividend','Net Installment'], aucW, {bold:true, aligns:['left','left','left','right','right','right']});
    if(!DB.auctions.length){
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...MUTED);
      doc.text('No auctions conducted yet.', marginX+2, y+7); y += 12;
    } else {
      DB.auctions.forEach(a=>{
        tableRow([a.date, groupName(a.groupId), memberName(a.winnerId), pdfAmt(a.bidAmount), pdfAmt(a.dividend), pdfAmt(a.netInstallment)], aucW,
          {aligns:['left','left','left','right','right','right'], colors:[[30,30,30],[30,30,30],[30,30,30],NAVY,GOLD,GREEN]});
      });
    }
    y += 10;

    // ---- Group-wise Summary ----
    sectionHeader('GROUP-WISE SUMMARY', NAVY);
    const grpW = [60, 40, 40, (rightX-marginX-140)];
    doc.setFillColor(245,246,249);
    doc.rect(marginX, y, rightX-marginX, 7, 'F');
    tableRow(['Group','Members','Installment','Status'], grpW, {bold:true, aligns:['left','left','right','left']});
    if(!DB.groups.length){
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...MUTED);
      doc.text('No groups created yet.', marginX+2, y+7); y += 12;
    } else {
      DB.groups.forEach(g=>{
        tableRow([g.name, `${(g.members||[]).length} / ${g.membersCount}`, pdfAmt(g.installment), g.status], grpW,
          {aligns:['left','left','right','left'], colors:[[30,30,30],[30,30,30],NAVY, g.status==='Active'?GREEN:MUTED]});
      });
    }

    const blob = doc.output('blob');
    const file = new File([blob], 'report-' + todayStr() + '.pdf', {type:'application/pdf'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({ files:[file], title:'Chit Fund Report', text: summaryText });
      return;
    }
    doc.save('report-' + todayStr() + '.pdf');
    window.open('https://wa.me/?text=' + encodeURIComponent(summaryText + '\n\n(PDF report downloaded — attach manually)'), '_blank');
    toast('PDF downloaded — attach it to WhatsApp manually');
  } catch(e){
    window.open('https://wa.me/?text=' + encodeURIComponent(summaryText), '_blank');
  }
}

/* ---------------- Version check / Update notification ---------------- */
async function checkForUpdate(manual){
  try{
    const res = await fetch('./version.json?t=' + Date.now(), { cache:'no-store' });
    const data = await res.json();
    if(data.version && data.version !== APP_VERSION){
      askConfirm(
        `🔔 New version v${data.version} is available!\n\n${data.notes||''}\n\nTap "Update Now" to reload and get the latest version. (Needs internet, takes a few seconds.)`,
        async ()=>{
          try{
            if('serviceWorker' in navigator){
              const regs = await navigator.serviceWorker.getRegistrations();
              for(const r of regs) await r.unregister();
            }
            if(window.caches){
              const keys = await caches.keys();
              for(const k of keys) await caches.delete(k);
            }
          } catch(e){}
          location.reload();
        }, 'Update Now', 'btn-primary'
      );
    } else if(manual){
      toast('✅ You are using the latest version (v' + APP_VERSION + ')');
    }
  } catch(e){
    if(manual) toast('Could not check for updates — please check your internet connection');
  }
}

function doBackup(){
  const blob = new Blob([JSON.stringify(DB,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'chit-software-backup-' + todayStr() + '.json'; a.click();
  toast('Backup downloaded');
}
function doRestore(){
  const f = document.getElementById('restoreFile').files[0];
  if(!f){ toast('Please choose a backup file'); return; }
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data.members || !data.groups){ toast('Invalid backup file'); return; }
      askConfirm('Replace ALL current data with this backup?', ()=>{
        DB = data; save(); syncBrandName(); toast('Data restored'); goto('dashboard');
      }, 'Restore', 'btn-primary');
    } catch(err){ toast('Could not read file'); }
  };
  reader.readAsText(f);
}
function wipeAll(){
  askConfirm('Erase ALL data permanently? This cannot be undone.', ()=>{
    localStorage.removeItem(DB_KEY);
    DB = loadDB(); syncBrandName(); toast('All data erased'); goto('dashboard');
  });
}

// Re-check the deactivated-customer list (a) every 2 minutes while the app
// stays open, and (b) immediately whenever the user comes back to this tab
// (e.g. switches apps and returns) — this makes a Deactivate/Activate from
// the License Manager take effect within seconds of the phone getting
// internet, instead of waiting for the next full app restart. Handles BOTH
// directions: locks the app if newly revoked, and automatically restores
// access if a previously-revoked customer gets reactivated.
let isCurrentlyRevokedLocked = false;
async function recheckRevocation(){
  if(!PUBLIC_KEY_JWK) return;
  const status = licenseStatus();
  if(status.state === 'active' || status.state === 'grace'){
    const cid = status.lic ? status.lic.cid : null;
    const revoked = await isCustomerRevoked(cid);
    if(revoked){
      isCurrentlyRevokedLocked = true;
      document.getElementById('sidebar').style.display = 'none';
      document.getElementById('main').style.display = 'none';
      renderRevokedScreen(cid);
    } else if(isCurrentlyRevokedLocked){
      // Was locked, now reactivated — restore access automatically.
      isCurrentlyRevokedLocked = false;
      toast('✅ Access restored');
      checkLicenseAndBoot();
    }
  }
}
setInterval(recheckRevocation, 2*60*1000);
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) recheckRevocation(); });
window.addEventListener('focus', recheckRevocation);

let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById('installBtn');
  if (btn) btn.style.display = 'inline-flex';
});
function installApp(){
  if (!deferredInstallPrompt){ toast('App is already installed, or your browser installed it automatically.'); return; }
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.finally(()=>{
    deferredInstallPrompt = null;
    const btn = document.getElementById('installBtn');
    if (btn) btn.style.display = 'none';
  });
}
window.addEventListener('appinstalled', ()=> toast('App installed! Find it on your home screen.'));
